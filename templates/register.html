<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registration</title>
    <link rel = 'stylesheet' type='text/css' media='screen' href='main.css'>
    <script src = 'main.js'></script>
</head>
<body>
    <form action="register" method ="post">
        {% csrf_token %}

        <input type="text" name="first_name" placeholder = "Enter your First Name">
        <br>
        <input type="text" name="last_name" placeholder = "Enter your Last Name"><br>
        <input type="text" name="user_name" placeholder = "Enter your user Name"><br>
        <input type="email" name="email" placeholder = "Enter your email"><br>
        <input type="password" name="password1" placeholder = "Enter your password"><br>
        <input type="password" name="password2" placeholder = "confirm your password"><br>
        <input type="Submit">
    </form>
    <div>
        <h3>
            {% for message in messages %}
            {{message}}
            {% endfor %}
        </h3>
    </div>
    
</body>
</html>
